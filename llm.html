<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>缓解累 · 详细指引（修复版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0e9e2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .app {
            width: 100%;
            max-width: 420px;
            background: #fffcf8;
            border-radius: 44px;
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.15);
            padding: 28px 20px 36px;
            border: 1px solid #f0e2d6;
        }
        .step { display: none; flex-direction: column; gap: 22px; }
        .step.active { display: flex; }
        .title { font-size: 28px; font-weight: 540; color: #3b312b; border-bottom: 2px solid #e0cfc2; padding-bottom: 12px; }
        .subtitle { font-size: 16px; background: #f3eae3; color: #5f4e42; padding: 16px 20px; border-radius: 30px; line-height: 1.5; border: 1px solid #e7d6ca; }
        .guide { font-size: 18px; color: #2e2a27; line-height: 1.6; padding: 10px 0; }
        .option-grid { display: flex; flex-wrap: wrap; gap: 14px; margin: 16px 0; }
        .option-btn {
            background: #fff;
            border: 1.5px solid #e0d0c4;
            border-radius: 100px;
            padding: 16px 24px;
            font-size: 17px;
            color: #3e342e;
            cursor: pointer;
            flex: 1 0 auto;
            text-align: center;
            transition: 0.1s;
        }
        .option-btn.selected { background: #dacbbf; border-color: #b8a290; color: #241e1a; font-weight: 500; }
        .detail-card {
            background: #f9f2ec;
            border-radius: 32px;
            padding: 28px 22px;
            border: 1px solid #ecdccc;
        }
        .step-item {
            background: white;
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 18px;
            border-left: 6px solid #cbb2a0;
            box-shadow: 0 6px 12px rgba(0,0,0,0.02);
        }
        .step-item p { font-size: 17px; color: #4f3f35; line-height: 1.6; margin-bottom: 12px; }
        .step-item .hint { font-size: 15px; color: #8b6f5c; background: #f9efe8; padding: 12px; border-radius: 16px; margin-top: 12px; }
        .btn {
            background: #dac1af;
            border: none;
            border-radius: 60px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 520;
            color: #2c221d;
            cursor: pointer;
            box-shadow: 0 6px 0 #b79b86;
            transition: 0.1s;
            text-align: center;
            margin: 20px 0 8px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b79b86; }
        .btn-small {
            background: #e8dace;
            border: 1px solid #d1bcae;
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 16px;
            color: #3d322b;
            cursor: pointer;
            display: inline-block;
            margin: 8px 8px 0 0;
        }
        .btn-small:disabled { opacity: 0.4; cursor: not-allowed; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .nav-btn {
            flex: 1;
            background: #f3e9e2;
            border: 1.5px solid #ddcdbf;
            border-radius: 50px;
            padding: 16px 0;
            font-size: 17px;
            color: #4d3b30;
            cursor: pointer;
            text-align: center;
        }
        .nav-btn.primary { background: #dac1af; border-color: #b99f8b; color: #2b211c; font-weight: 550; }
        .nav-btn:disabled { opacity: 0.4; pointer-events: none; }
        .card {
            background: #fdf7f2;
            border-radius: 36px;
            padding: 28px;
            border: 2px solid #e4d2c4;
        }
        .card-line { font-size: 18px; padding: 12px 0; border-bottom: 1px dashed #dccbbe; color: #3a2f28; }
        .card-line strong { color: #aa7e64; width: 120px; display: inline-block; }
        .hidden { display: none; }
        .timer-box { background: #e9dbd1; border-radius: 60px; padding: 28px; text-align: center; font-size: 48px; font-weight: 300; color: #4d3b30; margin: 16px 0; }
        .footnote { color: #aa8f7c; text-align: center; margin-top: 24px; font-size: 14px; }
        .status-msg { color: #8b6f5c; font-size: 16px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div id="stepContainer"></div>
    <div class="footnote">—— 陪伴你的每一次疲惫 ——</div>
</div>

<script>
(function() {
    let fatigueType = '';      // physical, mental, emotional, existential
    let canSleep = null;       // true/false (身体疲劳专用)
    let flowerSent = false;
    let smallActDone = false;
    let selfCompassionDone = false;
    let mentalExerciseDone = false;
    let physicalExerciseDone = false;

    const steps = [
        { id: 'welcome', title: '🌿 今天累了？', subtitle: '我们先花一分钟，看看你的疲惫属于哪一种，然后我会为你提供详细可操作的缓解步骤。', type: 'welcome' },
        { id: 'typeSelect', title: '你现在的感觉主要是？', subtitle: '请选择最接近的一项', type: 'typeSelect' },
        { id: 'physical', title: '身体疲劳', type: 'physical' },
        { id: 'mental', title: '精神疲劳', type: 'mental' },
        { id: 'emotional', title: '情绪疲劳', type: 'emotional' },
        { id: 'existential', title: '存在性疲劳', type: 'existential' },
        { id: 'sleepAdvice', title: '快速入睡技巧', type: 'sleepAdvice' },
        { id: 'card', title: '你的专属缓解方案', type: 'card' }
    ];

    let currentStepIndex = 0;
    const container = document.getElementById('stepContainer');

    function renderStep(index) {
        const step = steps[index];
        if (!step) return;
        let html = '';

        switch (step.type) {
            case 'welcome':
                html = `
                    <div class="step active">
                        <div class="title">${step.title}</div>
                        <div class="subtitle">${step.subtitle}</div>
                        <div style="margin: 20px 0;"></div>
                        <button class="btn" id="nextBtn">开始了解</button>
                    </div>
                `;
                break;
            case 'typeSelect':
                html = `
                    <div class="step active">
                        <div class="title">${step.title}</div>
                        <div class="subtitle">${step.subtitle}</div>
                        <div class="option-grid" id="typeOptions">
                            <button class="option-btn" data-type="physical">身体被掏空（肌肉酸、困、无力）</button>
                            <button class="option-btn" data-type="mental">脑子转不动（注意力涣散、思维迟钝）</button>
                            <button class="option-btn" data-type="emotional">心累、情绪耗竭（易怒、麻木、想哭）</button>
                            <button class="option-btn" data-type="existential">觉得一切没意义、迷茫（空虚、无价值感）</button>
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">上一步</button>
                            <button class="nav-btn primary" id="nextBtn" disabled>请先选择</button>
                        </div>
                    </div>
                `;
                break;
            case 'physical':
                html = `
                    <div class="step active">
                        <div class="title">${step.title}</div>
                        <div class="detail-card">
                            <div class="step-item">
                                <p>🧘 <strong>第一步：立即停止活动</strong></p>
                                <p>无论你在哪里，尽量坐下或躺下。如果条件允许，平躺，双腿稍微抬高（垫个枕头）。</p>
                            </div>
                            <div class="step-item">
                                <p>💤 <strong>你现在能睡觉吗？</strong></p>
                                <button class="btn-small" id="canSleepYes">能，我准备睡觉</button>
                                <button class="btn-small" id="canSleepNo">不能，还需要撑一会</button>
                                <div id="physicalStatus" class="status-msg"></div>
                            </div>
                            <div id="physicalDetail" class="step-item" style="display:none;"></div>
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">上一步</button>
                            <button class="nav-btn primary" id="nextBtn" disabled>请先完成练习</button>
                        </div>
                    </div>
                `;
                break;
            case 'mental':
                html = `
                    <div class="step active">
                        <div class="title">${step.title}</div>
                        <div class="detail-card">
                            <div class="step-item">
                                <p>🌳 <strong>第一步：离开信息源</strong></p>
                                <p>放下手机，离开屏幕，走到窗边或室外。如果无法离开，闭上眼睛。</p>
                                <button class="btn-small" id="step1Done">我已离开屏幕</button>
                            </div>
                            <div class="step-item">
                                <p>🎯 <strong>第二步：单任务练习（5分钟）</strong></p>
                                <p>现在只做一件事：喝一杯水。感受水的温度、杯子质感、水流过喉咙的感觉。如果念头飘走，轻轻带回来。</p>
                                <button class="btn-small" id="step2Done">已完成喝水</button>
                            </div>
                            <div class="step-item">
                                <p>🌬️ <strong>第三步：正念呼吸（3分钟）</strong></p>
                                <p>1. 吸气4秒（默数1-2-3-4）<br>2. 屏息2秒（1-2）<br>3. 呼气6秒（1-2-3-4-5-6）<br>重复5次。点击下方开始计时，完成后按钮会启用。</p>
                                <button class="btn-small" id="startMentalTimer" disabled>先完成前两步</button>
                                <div id="mentalTimerDisplay" style="font-size:20px; margin-top:12px;"></div>
                                <button class="btn-small" id="mentalDone" style="display:none;">已完成呼吸</button>
                            </div>
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">上一步</button>
                            <button class="nav-btn primary" id="nextBtn" disabled>请先完成练习</button>
                        </div>
                    </div>
                `;
                break;
            case 'emotional':
                html = `
                    <div class="step active">
                        <div class="title">${step.title}</div>
                        <div class="detail-card">
                            <div class="step-item">
                                <p>🎭 <strong>第一步：给情绪命名</strong></p>
                                <p>现在你的情绪叫什么？可以是一个词（如“疲惫”、“烦躁”、“悲伤”）。</p>
                                <input type="text" id="emotionName" placeholder="例如：心累" style="width:100%; padding:14px; border-radius:40px; border:1px solid #dacbbf; margin-top:8px;">
                                <button class="btn-small" id="nameDone">确认命名</button>
                            </div>
                            <div class="step-item">
                                <p>🌸 <strong>第二步：自我同情三句话</strong></p>
                                <p>对自己轻声说出：<br>“这真的很累，我允许自己感到累。”<br>“累是人之常情，不是我的错。”<br>“愿我善待自己，给我此刻需要的关怀。”</p>
                                <button class="btn-small" id="selfCompassionBtn">我已说出 ✓</button>
                            </div>
                            <div class="step-item">
                                <p>🎁 <strong>第三步：送花仪式</strong></p>
                                <p>想象一朵你喜欢的花，轻轻放在自己心口，对自己说：“我接受这份关怀。”</p>
                                <button class="btn-small" id="sendFlowerBtn">🌸 送出小花</button>
                                <span id="flowerMsg"></span>
                            </div>
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">上一步</button>
                            <button class="nav-btn primary" id="nextBtn" disabled>请完成三步</button>
                        </div>
                    </div>
                `;
                break;
            case 'existential':
                html = `
                    <div class="step active">
                        <div class="title">${step.title}</div>
                        <div class="detail-card">
                            <div class="step-item">
                                <p>🌌 <strong>敬畏体验</strong></p>
                                <p>回忆或想象一个让你感到震撼的场景：浩瀚星空、壮丽日落、或者一个平凡人坚韧的故事（如一位母亲、一位老师）。让自己沉浸在那个画面里1分钟。</p>
                                <button class="btn-small" id="aweDone">已完成想象</button>
                            </div>
                            <div class="step-item">
                                <p>📖 <strong>意义重构</strong></p>
                                <p>问自己：这份累想告诉我什么？我真正在乎的是什么？也许它提醒我需要连接、需要创造、需要爱。写下你的想法：</p>
                                <input type="text" id="meaningInput" placeholder="例如：我需要多陪陪家人" style="width:100%; padding:14px; border-radius:40px; border:1px solid #dacbbf;">
                                <button class="btn-small" id="meaningDone">确认写下</button>
                            </div>
                            <div class="step-item">
                                <p>🤝 <strong>微小贡献</strong></p>
                                <p>做一件对他人有用的小事：发一句问候给朋友，或为家人倒杯水。完成后打勾。</p>
                                <button class="btn-small" id="smallActDone">✓ 我完成了</button>
                                <span id="smallActMsg"></span>
                            </div>
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">上一步</button>
                            <button class="nav-btn primary" id="nextBtn" disabled>请完成练习</button>
                        </div>
                    </div>
                `;
                break;
            case 'sleepAdvice':
                html = `
                    <div class="step active">
                        <div class="title">快速入睡技巧</div>
                        <div class="detail-card">
                            <div class="step-item">
                                <p>🧘 <strong>4-7-8 呼吸法（详细步骤）</strong></p>
                                <p>1. 用鼻子吸气，默数4秒。<br>2. 屏住呼吸，默数7秒。<br>3. 用嘴巴缓慢呼气，默数8秒。<br>重复4-8次。这会激活副交感神经，帮助入睡。</p>
                                <button class="btn-small" id="start478Timer">开始4-7-8计时</button>
                                <div id="timer478Display" style="font-size:20px; margin-top:12px;"></div>
                                <button class="btn-small" id="done478" style="display:none;">已完成一轮</button>
                            </div>
                            <div class="step-item">
                                <p>🌡️ <strong>身体扫描（5分钟）</strong></p>
                                <p>平躺，闭上眼睛。将注意力从脚趾开始：感受脚趾、脚底、脚踝……逐渐向上移动到小腿、膝盖、大腿、臀部、腹部、胸部、手指、手臂、肩膀、颈部、头部。每个部位停留10秒，放松它。</p>
                                <button class="btn-small" id="startBodyScanTimer">开始身体扫描</button>
                                <div id="scanTimerDisplay" style="font-size:20px; margin-top:12px;"></div>
                                <button class="btn-small" id="doneScan" style="display:none;">已完成扫描</button>
                            </div>
                            <div class="step-item">
                                <p>📝 <strong>烦恼笔记</strong></p>
                                <p>拿一张纸或手机备忘录，写下脑中盘旋的事，告诉自己：“这些事情明天再处理，现在我的任务是睡觉。”</p>
                                <button class="btn-small" id="writeDone">我已写下</button>
                            </div>
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">上一步</button>
                            <button class="nav-btn primary" id="nextBtn" disabled>请至少完成一项</button>
                        </div>
                    </div>
                `;
                break;
            case 'card':
                let typeName = '', mainAdvice = '', exercise = '';
                if (fatigueType === 'physical') {
                    typeName = '身体疲劳';
                    mainAdvice = '优先休息或进行微休息';
                    exercise = canSleep ? '4-7-8呼吸法助眠' : '5分钟闭目养神呼吸法';
                } else if (fatigueType === 'mental') {
                    typeName = '精神疲劳';
                    mainAdvice = '减少信息输入，专注单任务';
                    exercise = '正念呼吸3分钟';
                } else if (fatigueType === 'emotional') {
                    typeName = '情绪疲劳';
                    mainAdvice = '命名情绪与自我同情';
                    exercise = '三句友善话+送花仪式';
                } else if (fatigueType === 'existential') {
                    typeName = '存在性疲劳';
                    mainAdvice = '寻找意义与微小连接';
                    exercise = '完成一件利他小事';
                }
                html = `
                    <div class="step active">
                        <div class="title">你的缓解方案</div>
                        <div class="card">
                            <div class="card-line"><strong>疲劳类型</strong> <span id="cardType">${typeName}</span></div>
                            <div class="card-line"><strong>核心建议</strong> <span id="cardAdvice">${mainAdvice}</span></div>
                            <div class="card-line"><strong>今日练习</strong> <span id="cardExercise">${exercise}</span></div>
                        </div>
                        <div style="text-align:center; margin:24px 0;"><span style="background:#e7d9cf; padding:12px 30px; border-radius:60px;">👆 截图保存</span></div>
                        <button class="btn" id="restartBtn">重新开始</button>
                    </div>
                `;
                break;
        }

        container.innerHTML = html;
        attachEvents(index);
    }

    function attachEvents(idx) {
        const step = steps[idx];
        if (!step) return;

        // 通用上一步
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (idx > 0) {
                    currentStepIndex = idx-1;
                    renderStep(currentStepIndex);
                }
            });
        }

        // 类型选择页
        if (step.type === 'typeSelect') {
            const options = document.querySelectorAll('#typeOptions .option-btn');
            const nextBtn = document.getElementById('nextBtn');
            options.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    options.forEach(b => b.classList.remove('selected'));
                    e.currentTarget.classList.add('selected');
                    nextBtn.disabled = false; // 启用下一步
                });
            });
            nextBtn.addEventListener('click', () => {
                const selected = document.querySelector('#typeOptions .selected');
                if (selected) {
                    fatigueType = selected.dataset.type;
                    if (fatigueType === 'physical') currentStepIndex = 2;
                    else if (fatigueType === 'mental') currentStepIndex = 3;
                    else if (fatigueType === 'emotional') currentStepIndex = 4;
                    else if (fatigueType === 'existential') currentStepIndex = 5;
                    renderStep(currentStepIndex);
                }
            });
        }

        // 欢迎页
        if (step.type === 'welcome') {
            document.getElementById('nextBtn').addEventListener('click', () => {
                currentStepIndex = 1;
                renderStep(currentStepIndex);
            });
        }

        // 身体疲劳
        if (step.type === 'physical') {
            const nextBtn = document.getElementById('nextBtn');
            const statusDiv = document.getElementById('physicalStatus');
            const detailDiv = document.getElementById('physicalDetail');

            const enableNext = () => {
                nextBtn.disabled = false;
            };

            document.getElementById('canSleepYes').addEventListener('click', () => {
                canSleep = true;
                statusDiv.innerText = '已选择：能睡觉';
                detailDiv.style.display = 'block';
                detailDiv.innerHTML = `
                    <p>😴 <strong>快速入睡技巧：4-7-8呼吸法</strong></p>
                    <p>1. 用鼻子吸气4秒<br>2. 屏住呼吸7秒<br>3. 用嘴呼气8秒<br>重复4次。点击下方开始计时，完成后点击“已完成”。</p>
                    <button class="btn-small" id="sleep478Timer">开始4-7-8</button>
                    <div id="sleepTimerDisplay" style="font-size:18px; margin-top:12px;"></div>
                    <button class="btn-small" id="sleepDone" style="display:none;">已完成呼吸</button>
                `;
                // 绑定计时器
                setTimeout(() => {
                    const startBtn = document.getElementById('sleep478Timer');
                    const doneBtn = document.getElementById('sleepDone');
                    const display = document.getElementById('sleepTimerDisplay');
                    startBtn.addEventListener('click', () => {
                        let step = '吸气';
                        let timeLeft = 4;
                        display.innerText = '吸气... 4秒';
                        const interval = setInterval(() => {
                            if (step === '吸气') {
                                timeLeft--;
                                display.innerText = `吸气... ${timeLeft}秒`;
                                if (timeLeft <= 0) { step = '屏息'; timeLeft = 7; display.innerText = '屏息... 7秒'; }
                            } else if (step === '屏息') {
                                timeLeft--;
                                display.innerText = `屏息... ${timeLeft}秒`;
                                if (timeLeft <= 0) { step = '呼气'; timeLeft = 8; display.innerText = '呼气... 8秒'; }
                            } else if (step === '呼气') {
                                timeLeft--;
                                display.innerText = `呼气... ${timeLeft}秒`;
                                if (timeLeft <= 0) {
                                    clearInterval(interval);
                                    display.innerText = '完成一轮，可重复';
                                    doneBtn.style.display = 'inline-block';
                                    doneBtn.addEventListener('click', () => {
                                        physicalExerciseDone = true;
                                        enableNext();
                                        statusDiv.innerText = '练习完成，可以继续';
                                    });
                                }
                            }
                        }, 1000);
                    });
                }, 100);
            });

            document.getElementById('canSleepNo').addEventListener('click', () => {
                canSleep = false;
                statusDiv.innerText = '已选择：不能睡觉';
                detailDiv.style.display = 'block';
                detailDiv.innerHTML = `
                    <p>🌬️ <strong>闭目养神5分钟详细步骤：</strong></p>
                    <p>1. 轻轻闭上眼睛，将一只手放在腹部。<br>2. 用鼻子缓慢吸气，感受腹部鼓起，心中默数4秒。<br>3. 屏住呼吸，默数2秒。<br>4. 用嘴巴缓慢呼气，感受腹部回落，默数6秒。<br>5. 重复以上步骤，持续5分钟。如果走神，温柔地将注意力拉回呼吸。</p>
                    <p class="hint">⏰ 点击下方开始计时，完成后点击“已完成”。</p>
                    <button class="btn-small" id="startBreathTimer">开始5分钟呼吸计时</button>
                    <div id="breathTimerDisplay" style="font-size:20px; margin-top:12px;"></div>
                    <button class="btn-small" id="breathDone" style="display:none;">已完成</button>
                `;
                setTimeout(() => {
                    const startBtn = document.getElementById('startBreathTimer');
                    const doneBtn = document.getElementById('breathDone');
                    const display = document.getElementById('breathTimerDisplay');
                    startBtn.addEventListener('click', () => {
                        let seconds = 300;
                        display.innerText = '5:00';
                        const interval = setInterval(() => {
                            seconds--;
                            const mins = Math.floor(seconds/60);
                            const secs = seconds%60;
                            display.innerText = `${mins}:${secs<10?'0'+secs:secs}`;
                            if (seconds <= 0) {
                                clearInterval(interval);
                                display.innerText = '时间到 ✅';
                                doneBtn.style.display = 'inline-block';
                                doneBtn.addEventListener('click', () => {
                                    physicalExerciseDone = true;
                                    enableNext();
                                    statusDiv.innerText = '练习完成，可以继续';
                                });
                            }
                        }, 1000);
                    });
                }, 100);
            });
        }

        // 精神疲劳
        if (step.type === 'mental') {
            const nextBtn = document.getElementById('nextBtn');
            let step1 = false, step2 = false, step3 = false;

            const checkAll = () => {
                if (step1 && step2 && step3) {
                    nextBtn.disabled = false;
                }
            };

            document.getElementById('step1Done').addEventListener('click', () => {
                step1 = true;
                document.getElementById('step1Done').disabled = true;
                checkAll();
            });
            document.getElementById('step2Done').addEventListener('click', () => {
                step2 = true;
                document.getElementById('step2Done').disabled = true;
                // 启用第三步计时器
                document.getElementById('startMentalTimer').disabled = false;
                checkAll();
            });

            const startTimerBtn = document.getElementById('startMentalTimer');
            const timerDisplay = document.getElementById('mentalTimerDisplay');
            const mentalDoneBtn = document.getElementById('mentalDone');
            startTimerBtn.addEventListener('click', () => {
                let seconds = 180;
                timerDisplay.innerText = '3:00';
                const interval = setInterval(() => {
                    seconds--;
                    const mins = Math.floor(seconds/60);
                    const secs = seconds%60;
                    timerDisplay.innerText = `${mins}:${secs<10?'0'+secs:secs}`;
                    if (seconds <= 0) {
                        clearInterval(interval);
                        timerDisplay.innerText = '呼吸完成 ✅';
                        mentalDoneBtn.style.display = 'inline-block';
                    }
                }, 1000);
                startTimerBtn.disabled = true;
            });

            mentalDoneBtn.addEventListener('click', () => {
                step3 = true;
                mentalDoneBtn.disabled = true;
                checkAll();
            });
        }

        // 情绪疲劳
        if (step.type === 'emotional') {
            const nextBtn = document.getElementById('nextBtn');
            let nameDone = false, compassionDone = false, flowerDone = false;

            const checkAll = () => {
                if (nameDone && compassionDone && flowerDone) {
                    nextBtn.disabled = false;
                }
            };

            document.getElementById('nameDone').addEventListener('click', () => {
                nameDone = true;
                document.getElementById('nameDone').disabled = true;
                checkAll();
            });
            document.getElementById('selfCompassionBtn').addEventListener('click', () => {
                compassionDone = true;
                document.getElementById('selfCompassionBtn').disabled = true;
                checkAll();
            });
            document.getElementById('sendFlowerBtn').addEventListener('click', () => {
                flowerDone = true;
                document.getElementById('sendFlowerBtn').disabled = true;
                document.getElementById('flowerMsg').innerText = '🌸 小花已送达';
                checkAll();
            });
        }

        // 存在性疲劳
        if (step.type === 'existential') {
            const nextBtn = document.getElementById('nextBtn');
            let aweDone = false, meaningDone = false, smallDone = false;

            const checkAll = () => {
                if (aweDone && meaningDone && smallDone) {
                    nextBtn.disabled = false;
                }
            };

            document.getElementById('aweDone').addEventListener('click', () => {
                aweDone = true;
                document.getElementById('aweDone').disabled = true;
                checkAll();
            });
            document.getElementById('meaningDone').addEventListener('click', () => {
                meaningDone = true;
                document.getElementById('meaningDone').disabled = true;
                checkAll();
            });
            document.getElementById('smallActDone').addEventListener('click', () => {
                smallDone = true;
                document.getElementById('smallActDone').disabled = true;
                document.getElementById('smallActMsg').innerText = '✓ 已完成';
                checkAll();
            });
        }

        // 睡眠技巧
        if (step.type === 'sleepAdvice') {
            const nextBtn = document.getElementById('nextBtn');
            let anyDone = false;

            const enableNext = () => {
                anyDone = true;
                nextBtn.disabled = false;
            };

            // 4-7-8
            document.getElementById('start478Timer')?.addEventListener('click', () => {
                const display = document.getElementById('timer478Display');
                const doneBtn = document.getElementById('done478');
                let step = '吸气';
                let timeLeft = 4;
                display.innerText = '吸气... 4秒';
                const interval = setInterval(() => {
                    if (step === '吸气') {
                        timeLeft--;
                        display.innerText = `吸气... ${timeLeft}秒`;
                        if (timeLeft <= 0) { step = '屏息'; timeLeft = 7; display.innerText = '屏息... 7秒'; }
                    } else if (step === '屏息') {
                        timeLeft--;
                        display.innerText = `屏息... ${timeLeft}秒`;
                        if (timeLeft <= 0) { step = '呼气'; timeLeft = 8; display.innerText = '呼气... 8秒'; }
                    } else if (step === '呼气') {
                        timeLeft--;
                        display.innerText = `呼气... ${timeLeft}秒`;
                        if (timeLeft <= 0) {
                            clearInterval(interval);
                            display.innerText = '完成一轮，可重复';
                            doneBtn.style.display = 'inline-block';
                            doneBtn.addEventListener('click', enableNext);
                        }
                    }
                }, 1000);
            });

            // 身体扫描
            document.getElementById('startBodyScanTimer')?.addEventListener('click', () => {
                let seconds = 300;
                const display = document.getElementById('scanTimerDisplay');
                const doneBtn = document.getElementById('doneScan');
                display.innerText = '5:00';
                const interval = setInterval(() => {
                    seconds--;
                    const mins = Math.floor(seconds/60);
                    const secs = seconds%60;
                    display.innerText = `${mins}:${secs<10?'0'+secs:secs}`;
                    if (seconds <= 0) {
                        clearInterval(interval);
                        display.innerText = '扫描完成 ✅';
                        doneBtn.style.display = 'inline-block';
                        doneBtn.addEventListener('click', enableNext);
                    }
                }, 1000);
            });

            document.getElementById('writeDone')?.addEventListener('click', () => {
                enableNext();
                document.getElementById('writeDone').disabled = true;
            });
        }

        // 卡片页
        if (step.type === 'card') {
            document.getElementById('restartBtn').addEventListener('click', () => {
                fatigueType = ''; canSleep = null; flowerSent = false; smallActDone = false;
                currentStepIndex = 0;
                renderStep(currentStepIndex);
            });
        }
    }

    renderStep(0);
})();
</script>
</body>
</html>
